<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produits</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js" defer></script>
    <script src="js/produits.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>Gestion des produits</h1>
            <nav class="nav">
                <a href="index.html">Accueil</a>
                <a href="categories.html">Catégories</a>
                <a href="produits.html">Produits</a>
                <a href="clients.html">Clients</a>
                <a href="commandes.html">Commandes</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Ajouter un produit</h2>
            <form id="produit-form">
                <div class="form-group">
                    <label for="id_produit">ID produit</label>
                    <input type="number" id="id_produit" name="id_produit" required>
                </div>

                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" required>
                </div>

                <div class="form-group">
                    <label for="prix">Prix</label>
                    <input type="number" step="0.01" id="prix" name="prix" required>
                </div>

                <div class="form-group">
                    <label for="stock">Stock</label>
                    <input type="number" id="stock" name="stock" required>
                </div>

                <div class="form-group">
                    <label for="id_categorie">ID catégorie</label>
                    <input type="number" id="id_categorie" name="id_categorie" required>
                </div>

                <button type="submit" class="btn">Ajouter</button>
            </form>
        </section>

        <section class="table-section">
            <h2>Liste des produits</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Prix</th>
                        <th>Stock</th>
                        <th>ID catégorie</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="produits-body">
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
