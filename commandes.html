<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commandes</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js" defer></script>
    <script src="js/commandes.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>Gestion des commandes</h1>
            <nav class="nav">
                <a href="index.html">Accueil</a>
                <a href="categories.html">Catégories</a>
                <a href="produits.html">Produits</a>
                <a href="clients.html">Clients</a>
                <a href="commandes.html">Commandes</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Ajouter une commande</h2>
            <form id="commande-form">
                <div class="form-group">
                    <label for="id_commande">ID commande</label>
                    <input type="text" id="id_commande" name="id_commande" required>
                </div>

                <div class="form-group">
                    <label for="date_commande">Date commande</label>
                    <input type="date" id="date_commande" name="date_commande" required>
                </div>

                <div class="form-group">
                    <label for="total">Total</label>
                    <input type="number" step="0.01" id="total" name="total" required>
                </div>

                <div class="form-group">
                    <label for="id_client">ID client</label>
                    <input type="number" id="id_client" name="id_client" required>
                </div>

                <button type="submit" class="btn">Ajouter</button>
            </form>
        </section>

        <section class="table-section">
            <h2>Liste des commandes</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>ID client</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="commandes-body">
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
